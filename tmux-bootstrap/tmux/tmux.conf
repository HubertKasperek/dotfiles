# Core behavior.
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",screen-256color:RGB"
set -g focus-events on
set -sg escape-time 10
set -g repeat-time 500
set -g history-limit 100000
set -g mouse on
set -g set-clipboard on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g display-time 3000
set -g status-interval 3
setw -g mode-keys vi
setw -g automatic-rename on
setw -g allow-rename off

# Prefix and window/pane management.
unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind r run-shell 'cfg="$XDG_CONFIG_HOME/tmux/tmux.conf"; [ -n "$XDG_CONFIG_HOME" ] || cfg="$HOME/.config/tmux/tmux.conf"; tmux source-file "$cfg" && tmux display-message "tmux config reloaded"'
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind , command-prompt -I "#{window_name}" "rename-window -- '%%'"
bind . command-prompt -I "#{session_name}" "rename-session -- '%%'"
bind R command-prompt -p "Rename window:" -I "#{window_name}" "rename-window -- '%%'"
bind x confirm-before -p "Kill pane #P? (y/n)" kill-pane
bind X confirm-before -p "Kill window #W? (y/n)" kill-window
bind C-f command-prompt -p "Switch session:" "switch-client -t '%%'"
bind g display-popup -E -w 90% -h 80% -d "#{pane_current_path}" "sh -lc 'git status --short --branch || echo \"Not a git repository\"; echo; printf \"Press Enter to close...\"; read -r _'"
bind G display-popup -w 90% -h 80% -d "#{pane_current_path}" "$HOME/.config/tmux/scripts/git-log-popup.sh"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Keep default split keys but inherit working directory.
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
unbind -n MouseDown3Pane
bind -n MouseDown3Pane display-menu -T "Pane #P" -x M -y M \
  "New Window" n "new-window -c '#{pane_current_path}'" \
  "Split Horizontal" h "split-window -h -c '#{pane_current_path}'" \
  "Split Vertical" v "split-window -v -c '#{pane_current_path}'" \
  "" "" "" \
  "Rename Window..." r "command-prompt -I '#{window_name}' 'rename-window -- \"%%\"'" \
  "Close Pane" x "confirm-before -p 'Kill pane #P? (y/n)' kill-pane" \
  "Close Window" X "confirm-before -p 'Kill window #W? (y/n)' kill-window"

# Copy mode optimized for keyboard workflow.
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
if-shell "command -v pbcopy >/dev/null 2>&1" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'" \
  "bind -T copy-mode-vi y send -X copy-selection-and-cancel"
bind y copy-mode

# Catppuccin Macchiato palette.
set -g @ctp_base "#24273a"
set -g @ctp_surface0 "#363a4f"
set -g @ctp_surface1 "#494d64"
set -g @ctp_overlay1 "#8087a2"
set -g @ctp_subtext0 "#a5adcb"
set -g @ctp_subtext1 "#b8c0e0"
set -g @ctp_text "#cad3f5"
set -g @ctp_blue "#8aadf4"
set -g @ctp_mauve "#c6a0f6"
set -g @ctp_teal "#8bd5ca"
set -g @ctp_yellow "#eed49f"
set -g @ctp_peach "#f5a97f"
set -g @ctp_red "#ed8796"

# UI styling.
set -g mode-style "fg=#{@ctp_base},bg=#{@ctp_blue},bold"
set -g message-style "fg=#{@ctp_text},bg=#{@ctp_surface0}"
set -g message-command-style "fg=#{@ctp_base},bg=#{@ctp_peach},bold"
set -g pane-active-border-style "fg=#{@ctp_blue}"
set -g pane-border-style "fg=#{@ctp_surface1}"
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=#{@ctp_blue}]#[bold],#[fg=#{@ctp_overlay1}]} #P #{pane_current_command} "

set -g status-position bottom
set -g status-justify left
set -g status-left-length 60
set -g status-right-length 220
set -g status-style "fg=#{@ctp_text},bg=#{@ctp_surface0}"
set -g status-left "#[fg=#{@ctp_mauve},bold] #S #[fg=#{@ctp_overlay1}]#{?pane_synchronized,| SYNC ,}#{?window_zoomed_flag,| ZOOM ,}#{?pane_in_mode,| COPY ,}|#[default] "
set -g status-right "#[fg=#{@ctp_subtext0}]#{b:pane_current_path}#[fg=#{@ctp_teal}]#(/bin/bash ~/.config/tmux/scripts/git-status-segment.sh \"#{pane_current_path}\" 2>/dev/null) #[fg=#{@ctp_overlay1}]| #[fg=#{@ctp_yellow}]%a %Y-%m-%d %H:%M "

set -g window-status-separator ""
set -g window-status-style "fg=#{@ctp_subtext0},bg=#{@ctp_surface0}"
set -g window-status-format " #[fg=#{@ctp_overlay1}]#I #[fg=#{@ctp_subtext1}]#W "
set -g window-status-current-style "fg=#{@ctp_base},bg=#{@ctp_blue},bold"
set -g window-status-current-format " #[fg=#{@ctp_base},bg=#{@ctp_blue},bold]#I #[fg=#{@ctp_base},bg=#{@ctp_blue},bold]#W "
set -g window-status-activity-style "fg=#{@ctp_base},bg=#{@ctp_yellow},bold"
set -g window-status-bell-style "fg=#{@ctp_base},bg=#{@ctp_red},bold"
